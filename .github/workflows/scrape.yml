name: Scrape Billboard Weekly

# Run every Tuesday 10:00 UTC + manual trigger
on:
  schedule:
    - cron: '0 10 * * 2'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run Scraper (with retry)
        run: |
          for i in 1 2 3; do
            python scrape_billboard.py && break || sleep 30
          done

      - name: Commit CSV and HTML
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git add *.csv index.html
          git diff --cached --quiet || git commit -m "Update Billboard Hot 100 CSVs for $(date +'%Y-%m-%d')"
          git push
